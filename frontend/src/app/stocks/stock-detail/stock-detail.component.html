<div class="card" style="width: 30rem; align-self: auto;">
  <div class="card-header" style="font-style: italic;">Stocks to Buy</div>
  <div class="card-body">
    @if (error) {
      <div class="alert alert-danger">
        <p>{{ error }}</p>
      </div>
    }
    @if (isLoading) {
      <div style="text-align: center;">
        <app-loading-spinner></app-loading-spinner>
      </div>
    }
    @if (!isLoading) {
      <form [formGroup]="stockForm" (ngSubmit)="onBuy()">
        <div class="form-group row">
          <label for="name" class="col-sm-6 col-form-label">Name: </label>
          <div class="col-sm-4">
            <input type="text" id="name" class="form-control" formControlName="name" />
            </div>
          </div>
          <div class="form-group row">
            <label for="investmentType" class="col-sm-6 col-form-label">Investment Type: </label>
            <div class="col-sm-4">
              <input type="text" id="investmentType" class="form-control" formControlName="investmentType" />
              </div>
            </div>
            <div class="form-group row">
              <label for="currentPrice" class="col-sm-6 col-form-label">Current Price: </label>
              <div class="col-sm-4">
                <input type="number" id="currentPrice" class="form-control" formControlName="currentPrice" />
                </div>
              </div>
              <div class="form-group row">
                <label for="anticipatedGrowth" class="col-sm-6 col-form-label">Anticipated Growth: </label>
                <div class="col-sm-4">
                  <input type="number" id="anticipatedGrowth" class="form-control" formControlName="anticipatedGrowth" />
                  </div>
                </div>
                <div class="form-group row">
                  <label for="quantity" class="col-sm-6 col-form-label">Quantity*: </label>
                  <div class="col-sm-4">
                    <input type="number" id="quantity" class="form-control" formControlName="quantity" required
                      min="1" max="20" />
                    </div>
                  </div>
                  <div>
                    <button class="btn btn-primary" type="submit" [disabled]="!stockForm.valid">
                      {{'Buy Stock'}}
                    </button>
                    <!-- <button class="btn btn-secondary" type="reset">Clear</button> -->
                  </div>
                </form>
              }
            </div>
          </div>
