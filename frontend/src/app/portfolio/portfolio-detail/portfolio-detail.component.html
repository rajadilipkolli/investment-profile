<div class="card" style="width: 30rem; align-self: auto;">
  <div class="card-header" style="font-style: italic;">My Stocks</div>
  <div class="card-body">
    @if (error) {
      <div class="alert alert-danger">
        <p>{{ error }}</p>
      </div>
    }
    @if (isLoading) {
      <div style="text-align: center;">
        <app-loading-spinner></app-loading-spinner>
      </div>
    }
    @if (!isLoading && portfolio) {
      <form [formGroup]="portfolioForm" (ngSubmit)="onPorfolioSubmit()">
        <div class="form-group row">
          <label for="name" class="col-sm-6 col-form-label">Name: </label>
          <div class="col-sm-4">
            <input type="text" id="name" class="form-control" formControlName="name" />
          </div>
        </div>
        <div class="form-group row">
          <label for="type" class="col-sm-6 col-form-label">Type: </label>
          <div class="col-sm-4">
            <input type="text" id="type" class="form-control" formControlName="type" />
          </div>
        </div>
        <div class="form-group row">
          <label for="costPrice" class="col-sm-6 col-form-label">Cost Price: </label>
          <div class="col-sm-4">
            <input type="number" id="costPrice" class="form-control" formControlName="costPrice" />
            </div>
          </div>
          <div class="form-group row">
            <label for="currentPrice" class="col-sm-6 col-form-label">Current Price: </label>
            <div class="col-sm-4">
              <input type="number" id="currentPrice" class="form-control" formControlName="currentPrice" />
              </div>
            </div>
            <div class="form-group row">
              <label for="quantity" class="col-sm-6 col-form-label">Quantity: </label>
              <div class="col-sm-4">
                <input type="number" id="quantity" class="form-control" formControlName="quantity"
                  required min="1" oninput="validity.valid||(value='');" />
                </div>
              </div>
              <div>
                <button class="btn btn-primary" type="submit" (click)="onUpdateClick()" [disabled]="!portfolioForm.valid">
                  {{'UPDATE'}}
                </button> | <button class="btn btn-primary" type="submit" (click)="onDeleteClick()"
                [disabled]="!portfolioForm.valid">
                {{'DELETE'}}
              </button>
            </div>
          </form>
        }
      </div>
    </div>
